spring:
  datasource:
    url: jdbc:mysql://your-prod-db-url:3306/${DB_NAME}?serverTimezone=Asia/Seoul
    username: ${USER_NAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  config:
    import: "aws-parameterstore:/camp-health-app/prod/"

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: "health,info"
  endpoint:
    health:
      show-details: never
  info:
    env:
      enabled: true

info:
  app:
    name: "Member Profile Service"
    team-name: "${team-name}"
    message: "${APP_MESSAGE}"

logging:
  level:
    root: INFO