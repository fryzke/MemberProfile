  spring:
    datasource:
      url: jdbc:h2:mem:${DB_NAME}
      driver-class-name: org.h2.Driver
      username: ${USER_NAME}
      password: ${DB_PASSWORD}
    h2:
      console:
        enabled: true
    jpa:
      hibernate:
        ddl-auto: create
      show-sql: true
      properties:
        hibernate:
          format_sql: true